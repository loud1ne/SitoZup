<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Portfolio di Costruzioni Zuppardo: scopri le nostre realizzazioni. Ville, ristrutturazioni e design d'interni ad Avola, Noto e Siracusa.">
    <title>Portfolio | Zuppardo Costruzioni</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="vendor/aos/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(12, 10, 9, 0.98);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            cursor: zoom-out;
        }
        .lightbox.active {
            display: flex;
            opacity: 1;
        }
        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            transform: scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .lightbox.active img {
            transform: scale(1);
        }
        .masonry-grid {
            column-count: 1;
            column-gap: 2rem;
        }
        @media (min-width: 768px) {
            .masonry-grid { column-count: 2; }
        }
        @media (min-width: 1024px) {
            .masonry-grid { column-count: 3; }
        }
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="texture-bg antialiased">

<div id="main-nav-placeholder"></div>

<header class="pt-48 pb-24 px-6 md:px-20 max-w-screen-2xl mx-auto text-center relative">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-px h-32 bg-stone-200"></div>
    <span class="block text-xs font-bold uppercase tracking-[0.3em] text-stone-400 mb-6 reveal-text">Portfolio</span>
    <h1 class="text-5xl md:text-8xl serif reveal-text leading-tight" data-delay="100">Le nostre <br><span class="italic text-stone-500 font-light">Opere.</span></h1>
</header>

<section class="px-6 md:px-20 pb-32 max-w-screen-2xl mx-auto">
    <div class="masonry-grid">

        <div class="masonry-item relative group overflow-hidden cursor-zoom-in" onclick="openLightbox(this)" data-aos="fade-up">
            <div class="overflow-hidden">
                <img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?q=80&w=1200" class="w-full h-auto object-cover transition-transform duration-1000 group-hover:scale-105" alt="Villa Residenziale">
            </div>
            <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-500 pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 p-6 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none">
                <p class="text-white text-xs uppercase tracking-widest font-bold">Residenziale</p>
                <p class="text-white/80 text-[10px] uppercase tracking-widest mt-1">Avola, SR</p>
            </div>
        </div>

        <div class="masonry-item relative group overflow-hidden cursor-zoom-in" onclick="openLightbox(this)" data-aos="fade-up" data-aos-delay="100">
            <div class="overflow-hidden">
                <img src="https://images.unsplash.com/photo-1501183638710-841dd1904471?q=80&w=1200" class="w-full h-auto object-cover transition-transform duration-1000 group-hover:scale-105" alt="Dettaglio Architettonico">
            </div>
            <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-500 pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 p-6 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none">
                <p class="text-white text-xs uppercase tracking-widest font-bold">Dettagli</p>
            </div>
        </div>

        <div class="masonry-item relative group overflow-hidden cursor-zoom-in" onclick="openLightbox(this)" data-aos="fade-up" data-aos-delay="200">
            <div class="overflow-hidden">
                <img src="https://images.unsplash.com/photo-1613490493576-7fde63acd811?q=80&w=1200" class="w-full h-auto object-cover transition-transform duration-1000 group-hover:scale-105" alt="Esterno Moderno">
            </div>
            <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-500 pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 p-6 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none">
                <p class="text-white text-xs uppercase tracking-widest font-bold">Esterni</p>
                <p class="text-white/80 text-[10px] uppercase tracking-widest mt-1">Noto, SR</p>
            </div>
        </div>

        <div class="masonry-item relative group overflow-hidden cursor-zoom-in" onclick="openLightbox(this)" data-aos="fade-up" data-aos-delay="100">
            <div class="overflow-hidden">
                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1200" class="w-full h-auto object-cover transition-transform duration-1000 group-hover:scale-105" alt="Interni">
            </div>
            <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-500 pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 p-6 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none">
                <p class="text-white text-xs uppercase tracking-widest font-bold">Interni</p>
            </div>
        </div>

        <div class="masonry-item relative group overflow-hidden cursor-zoom-in" onclick="openLightbox(this)" data-aos="fade-up" data-aos-delay="200">
            <div class="overflow-hidden">
                <img src="https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?q=80&w=1200" class="w-full h-auto object-cover transition-transform duration-1000 group-hover:scale-105" alt="Ristrutturazione">
            </div>
            <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-500 pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 p-6 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none">
                <p class="text-white text-xs uppercase tracking-widest font-bold">Ristrutturazione</p>
                <p class="text-white/80 text-[10px] uppercase tracking-widest mt-1">Siracusa</p>
            </div>
        </div>

    </div>
</section>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <div class="absolute top-6 right-6 text-white cursor-pointer p-4 hover:text-stone-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
    </div>
    <img id="lightbox-img" src="" alt="Zoomed Project" onclick="event.stopPropagation()">
</div>

<div id="footer-placeholder"></div>

<script src="vendor/aos/aos.js"></script>
<script src="main.js"></script>
<script>
    function openLightbox(el) {
        const img = el.querySelector('img');
        const lightboxImg = document.getElementById('lightbox-img');
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;

        const lightbox = document.getElementById('lightbox');
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
        if(e.key === "Escape") closeLightbox();
    });
</script>
</body>
</html>
